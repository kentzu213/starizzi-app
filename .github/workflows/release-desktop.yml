name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .
        env:
          # Cross-repo private package read (@kentzu213/graph-view in izzi-web).
          # PAT wins if set; else automatic token + `permissions: packages: read`
          # works when this repo is granted read access to the package.
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build desktop app
        run: pnpm build

      - name: Package and Publish
        run: npx electron-builder --win --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    # Run AFTER build-windows (not in parallel) so only one job creates the
    # GitHub release; this one then uploads the mac assets to the existing
    # release. Prevents the "422 already_exists" race when both jobs publish.
    needs: build-windows
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .
        env:
          # Cross-repo private package read (@kentzu213/graph-view in izzi-web).
          # PAT wins if set; else automatic token + `permissions: packages: read`
          # works when this repo is granted read access to the package.
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build desktop app
        run: pnpm build

      - name: Package and Publish
        run: npx electron-builder --mac --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
