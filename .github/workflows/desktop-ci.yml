name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  desktop-ci:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # Cross-repo private package read (@kentzu213/graph-view lives in izzi-web).
          # Two supported auth paths (either one works, PAT wins if set):
          #  1) Grant this repo read access to the package (package settings ->
          #     Manage Actions access) — then the automatic GITHUB_TOKEN below works
          #     with `permissions: packages: read`. No secret to store/rotate.
          #  2) Add a classic PAT (read:packages) as secret GH_PACKAGES_TOKEN.
          # Consumed by root .npmrc (${NODE_AUTH_TOKEN}).
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build workspace
        run: pnpm build:all

      - name: Run desktop smoke tests
        run: pnpm --filter @openclaw/desktop test
